<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; color: #333; line-height: 1.6; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { border-bottom: 2px solid #0066cc; padding-bottom: 10px; margin-bottom: 20px; }
    .footer { border-top: 1px solid #ddd; padding-top: 15px; margin-top: 30px; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <strong>Support Team</strong>
    </div>

    <p>Hi {{name}},</p>

    <p>Regarding your support ticket <strong>#{{ticket_id}}</strong>:</p>

    <div style="background: #f9f9f9; padding: 15px; border-left: 3px solid #0066cc; margin: 20px 0;">
      {{message}}
    </div>

    <p>If you have any further questions, please reply to this email or reference ticket #{{ticket_id}}.</p>

    <div class="footer">
      <p>This email was sent by our support system. Please do not reply to the automated address directly.</p>
    </div>
  </div>
</body>
</html>
